<div
  class="card"
  appHighlight="lightblue"
  [ngClass]="cardClasses"
  [ngStyle]="{'border-left': '6px solid ' + borderColor}">

  <h3>{{ course.name }}</h3>

  <p>{{ course.code }}</p>

  <p>{{ course.credits | creditLabel }}</p>

  <div [ngSwitch]="course.gradeStatus">

    <span *ngSwitchCase="'passed'" style="color:green">
      Passed
    </span>

    <span *ngSwitchCase="'failed'" style="color:red">
      Failed
    </span>

    <span *ngSwitchDefault style="color:gray">
      Pending
    </span>

  </div>

  <br>

  <button (click)="enroll()">
    Enroll
  </button>

  <button (click)="toggleDetails()">
    {{ isExpanded ? 'Hide Details' : 'Show Details' }}
  </button>

</div>
