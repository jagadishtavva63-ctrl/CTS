<h2>Student Enrollment Form</h2>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

  <label>Name</label><br>
  <input
    type="text"
    name="studentName"
    [(ngModel)]="studentName"
    required
    minlength="3"
    #nameCtrl="ngModel">

  <div *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">
    Name is required
  </div>

  <div *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">
    Name must be at least 3 characters
  </div>

  <br><br>

  <label>Email</label><br>
  <input
    type="email"
    name="studentEmail"
    [(ngModel)]="studentEmail"
    required
    email>

  <br><br>

  <label>Course ID</label><br>
  <input
    type="number"
    name="courseId"
    [(ngModel)]="courseId"
    required>

  <br><br>

  <label>Semester</label><br>

  <select
    name="preferredSemester"
    [(ngModel)]="preferredSemester">

    <option>Odd</option>
    <option>Even</option>

  </select>

  <br><br>

  <label>

    <input
      type="checkbox"
      name="agreeToTerms"
      [(ngModel)]="agreeToTerms"
      required>

    I Agree to Terms

  </label>

  <br><br>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">

    Submit

  </button>
  <button
    type="button"
    (click)="enrollForm.resetForm()">
    Reset
</button>

</form>

<div *ngIf="submitted" class="success">
    Enrollment request submitted successfully!
</div>
