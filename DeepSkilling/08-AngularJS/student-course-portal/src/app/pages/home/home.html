<h1>{{ portalName }}</h1>

<p>
  Manage your courses, profile and enrollment from one place.
</p>

<button
    [disabled]="!isPortalActive"
    (click)="onEnrollClick()">
    Enroll Now
</button>

<p>{{ message }}</p>

<br>

<input
    type="text"
    [(ngModel)]="searchTerm"
    placeholder="Search Course">

<p>Searching for: {{ searchTerm }}</p>

<div class="stats">

    <div class="card">
        <h3>Courses Available</h3>
        <p>12</p>
    </div>

    <div class="card">
        <h3>Enrolled</h3>
        <p>3</p>
    </div>

    <div class="card">
        <h3>GPA</h3>
        <p>3.8</p>
    </div>

</div>
